services:
  backend:
    build: .
    image: research-assistant
    ports:
      - "8000:8000"
    env_file:
      - .env
    command: uvicorn Research_Backend_Server:server --host 0.0.0.0 --port 8000
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  frontend:
    image: research-assistant
    ports:
      - "8501:8501"
    env_file:
      - .env
    environment:
      - BACKEND_URL=http://backend:8000
    command: >
      streamlit run Research_Frontend.py
      --server.port 8501
      --server.address 0.0.0.0
      --server.headless true
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
